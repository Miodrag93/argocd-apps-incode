apiVersion: apps/v1
kind: Deployment
metadata:
  name: incode-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: incode-backend
  template:
    metadata:
      labels:
        app: incode-backend
    spec:
      containers:
        - name: incode-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: ALLOWED_HOSTS
              value: {{ .Values.env.allowedHosts | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.databaseSecret.name }}
                  key: {{ .Values.env.databaseSecret.key }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
