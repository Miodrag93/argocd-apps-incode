apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: git@github.com:Miodrag93/argocd-apps-incode.git
    targetRevision: HEAD
    path: karpenter
    helm:
      valueFiles:
        - {{ .Values.environment }}.values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - ServerSideApply=true
