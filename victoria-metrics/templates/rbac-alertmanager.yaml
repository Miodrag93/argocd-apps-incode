apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.alertmanager.serviceAccountName }}
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.alertmanager.serviceAccountName }}
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.alertmanager.serviceAccountName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.alertmanager.serviceAccountName }}
    namespace: monitoring
