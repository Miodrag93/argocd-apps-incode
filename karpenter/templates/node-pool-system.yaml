apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: incode-{{ .Values.environment }}-system
spec:
  limits:
    cpu: {{ .Values.systemNodePool.cpuLimit }}
  disruption:
    budgets:
      - nodes: "1"
    consolidateAfter: 1m
    consolidationPolicy: WhenEmpty
  template:
    metadata:
      labels:
        dedicated: system
    spec:
      taints:
        - key: dedicated
          value: system
          effect: NoSchedule
      expireAfter: 336h
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: incode-{{ .Values.environment }}-default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ .Values.systemNodePool.capacityType | toYaml | nindent 12 }}
        - key: eks.amazonaws.com/instance-category
          operator: In
          values: {{ .Values.systemNodePool.instanceCategory | toYaml | nindent 12 }}
        - key: eks.amazonaws.com/instance-size
          operator: In
          values: {{ .Values.systemNodePool.instanceSize | toYaml | nindent 12 }}
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: kubernetes.io/os
          operator: In
          values: [linux]
      terminationGracePeriod: 5m
